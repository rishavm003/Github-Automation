name: Daily Automation Bot

on:
  schedule:
    - cron: '30 0 * * *'  # Runs at 6 AM IST (00:30 UTC) every day
  workflow_dispatch:      # Allows manual triggering

jobs:
  run-daily-bot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write       # Needed to commit changes
      issues: write         # Needed to comment on issues

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run automation script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'rishavm003'
          git config --global user.email 'rishavmishra2003@gmail.com'
          git add data/logs/ data/reports/ README.md data/drafts/
          # Check if there are changes to commit
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-generated daily execution reports and logs [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Send Notification Mail on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ⚠️ GitHub Automator: Daily Run Failed
          to: ${{ secrets.MAIL_TO }}
          from: GitHub Automator Notifications
          body: |
            Hello,
            
            This is an automated notification. Your GitHub Daily Automation Bot experienced an error during its morning run.
            
            Please check your GitHub Actions logs to investigate the issue:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            - The GitHub Automator Bot
